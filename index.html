<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕云百业侠境预约系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🏔️ 燕云百业侠境预约系统</h1>
            <div class="nav-tabs">
                <button class="tab-btn active" data-tab="user">用户预约</button>
                <button class="tab-btn" data-tab="admin">管理后台</button>
            </div>
        </header>

        <!-- 用户界面 -->
        <div id="user-panel" class="panel active">
            <div class="user-layout">
                <!-- 左侧：角色管理 -->
                <div class="sidebar">
                    <div class="card">
                        <h2>🎭 我的角色</h2>
                        <div id="character-list" class="character-list">
                            <p class="empty-tip">暂无角色，请创建</p>
                        </div>
                        <button class="btn btn-primary" onclick="showCharacterModal()">+ 创建角色</button>
                    </div>
                </div>

                <!-- 右侧：预约功能 -->
                <div class="main-content">
                    <!-- 角色未选择提示 -->
                    <div id="no-character-tip" class="card tip-card">
                        <p>请先创建或选择一个角色</p>
                    </div>

                    <!-- 预约表单 -->
                    <div id="booking-form" class="card" style="display: none;">
                        <h2>📅 新建预约</h2>
                        <div class="form-group">
                            <label>当前角色</label>
                            <div id="current-character" class="current-character"></div>
                        </div>
                        <div class="form-group">
                            <label>选择百业 <span class="required">*</span></label>
                            <select id="baiye-select" class="form-control">
                                <option value="">请选择百业</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>选择时间 <span class="required">*</span></label>
                            <select id="time-select" class="form-control">
                                <option value="">请选择时间</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>备注</label>
                            <input type="text" id="remark-input" class="form-control" placeholder="可选：添加备注信息">
                        </div>
                        <button class="btn btn-primary" onclick="createBooking()">确认预约</button>
                    </div>

                    <!-- 预约列表 -->
                    <div class="card">
                        <h2>📋 预约列表</h2>
                        <div class="filter-bar">
                            <select id="filter-baiye" class="form-control" onchange="loadBookings()">
                                <option value="">全部百业</option>
                            </select>
                            <select id="filter-time" class="form-control" onchange="loadBookings()">
                                <option value="">全部时间</option>
                            </select>
                        </div>
                        <div id="booking-list" class="booking-list">
                            <p class="empty-tip">暂无预约</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 管理后台 -->
        <div id="admin-panel" class="panel">
            <div class="admin-layout">
                <!-- 百业管理 -->
                <div class="card">
                    <div class="card-header">
                        <h2>🏢 百业管理</h2>
                        <button class="btn btn-small" onclick="showBaiyeModal()">+ 创建百业</button>
                    </div>
                    <div id="admin-baiye-list" class="admin-list">
                        <p class="empty-tip">暂无百业</p>
                    </div>
                </div>

                <!-- 时间段管理 -->
                <div class="card">
                    <div class="card-header">
                        <h2>⏰ 时间段管理</h2>
                        <button class="btn btn-small" onclick="showTimeModal()">+ 添加时段</button>
                    </div>
                    <div id="admin-time-list" class="admin-list">
                        <p class="empty-tip">暂无时间段</p>
                    </div>
                </div>

                <!-- 成员管理 -->
                <div class="card">
                    <div class="card-header">
                        <h2>👥 成员管理</h2>
                        <button class="btn btn-small" onclick="showMemberModal()">+ 添加成员</button>
                    </div>
                    <div id="admin-member-list" class="admin-list">
                        <p class="empty-tip">暂无成员</p>
                    </div>
                </div>

                <!-- 预约管理 -->
                <div class="card">
                    <div class="card-header">
                        <h2>📋 预约管理</h2>
                        <button class="btn btn-small btn-danger" onclick="clearAllBookings()">清空所有</button>
                    </div>
                    <div id="admin-booking-list" class="admin-list">
                        <p class="empty-tip">暂无预约</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 角色创建/编辑模态框 -->
    <div id="character-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建角色</h3>
                <button class="close-btn" onclick="closeModal('character-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="character-id">
                <div class="form-group">
                    <label>角色名称 <span class="required">*</span></label>
                    <input type="text" id="character-name" class="form-control" placeholder="输入角色名称">
                </div>
                <div class="form-group">
                    <label>木桩秒伤（万）</label>
                    <input type="number" id="character-dps" class="form-control" placeholder="输入秒伤数值">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('character-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveCharacter()">保存</button>
            </div>
        </div>
    </div>

    <!-- 百业创建模态框 -->
    <div id="baiye-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建百业</h3>
                <button class="close-btn" onclick="closeModal('baiye-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>百业名称 <span class="required">*</span></label>
                    <input type="text" id="baiye-name" class="form-control" placeholder="输入百业名称">
                </div>
                <div class="form-group">
                    <label>百业描述</label>
                    <input type="text" id="baiye-desc" class="form-control" placeholder="可选：输入描述">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('baiye-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveBaiye()">保存</button>
            </div>
        </div>
    </div>

    <!-- 时间段创建模态框 -->
    <div id="time-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加时间段</h3>
                <button class="close-btn" onclick="closeModal('time-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>时间描述 <span class="required">*</span></label>
                    <input type="text" id="time-desc" class="form-control" placeholder="例如：周一至周五 20:00-22:00">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('time-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveTimeSlot()">保存</button>
            </div>
        </div>
    </div>

    <!-- 成员创建模态框 -->
    <div id="member-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加成员</h3>
                <button class="close-btn" onclick="closeModal('member-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>成员名称 <span class="required">*</span></label>
                    <input type="text" id="member-name" class="form-control" placeholder="输入成员名称">
                </div>
                <div class="form-group">
                    <label>所属百业 <span class="required">*</span></label>
                    <select id="member-baiye" class="form-control">
                        <option value="">请选择百业</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('member-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveMember()">保存</button>
            </div>
        </div>
    </div>

    <!-- 分享模态框 -->
    <div id="share-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>分享预约链接</h3>
                <button class="close-btn" onclick="closeModal('share-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <p>复制以下链接分享给成员：</p>
                <div class="share-link-box">
                    <input type="text" id="share-link" class="form-control" readonly>
                    <button class="btn btn-primary" onclick="copyShareLink()">复制</button>
                </div>
                <p class="tip">成员打开链接后可直接参与预约</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
