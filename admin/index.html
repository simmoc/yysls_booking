<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕云百业侠境 - 管理后台</title>
    <link rel="stylesheet" href="/shared/styles.css">
    <link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>管理后台</h1>
            <p class="subtitle">燕云百业侠境预约系统</p>
        </header>

        <!-- 用户信息栏 -->
        <div class="user-info-bar">
            <span class="user-id" id="user-fingerprint">正在识别身份...</span>
            <span class="user-role" id="user-role">--</span>
        </div>

        <!-- 非管理员提示（默认隐藏） -->
        <div class="admin-notice" id="admin-notice" style="display: none;">
            您当前不是管理员账号，管理界面以只读模式展示。如需管理员权限，请联系系统管理员在数据库中修改您的角色。
        </div>

        <!-- 管理布局 -->
        <div class="admin-layout">
            <!-- 百业管理 -->
            <div class="card">
                <div class="card-header">
                    <h2>百业管理</h2>
                    <button class="btn btn-small btn-primary admin-action" id="btn-create-baiye">+ 创建百业</button>
                </div>
                <div id="admin-baiye-list" class="admin-list">
                    <p class="empty-tip">暂无百业</p>
                </div>
            </div>

            <!-- 时间段管理 -->
            <div class="card">
                <div class="card-header">
                    <h2>时间段管理</h2>
                    <button class="btn btn-small btn-primary admin-action" id="btn-create-time">+ 创建时段</button>
                </div>
                <div id="admin-time-list" class="admin-list">
                    <p class="empty-tip">暂无时间段</p>
                </div>
            </div>

            <!-- 成员管理（预约角色列表） -->
            <div class="card">
                <div class="card-header">
                    <h2>预约角色</h2>
                </div>
                <!-- 成员筛选 -->
                <div class="member-filter">
                    <select id="member-filter-baiye" class="form-control">
                        <option value="">全部百业</option>
                    </select>
                </div>
                <div id="admin-member-list" class="admin-list">
                    <p class="empty-tip">暂无预约角色</p>
                </div>
            </div>

            <!-- 预约管理 -->
            <div class="card">
                <div class="card-header">
                    <h2>预约管理</h2>
                    <button class="btn btn-small btn-danger admin-action" id="btn-clear-bookings">清空所有</button>
                </div>
                <!-- 预约筛选 -->
                <div class="filter-bar">
                    <select id="booking-filter-baiye" class="form-control">
                        <option value="">全部百业</option>
                    </select>
                    <select id="booking-filter-time" class="form-control">
                        <option value="">全部时间</option>
                    </select>
                </div>
                <div id="admin-booking-list" class="admin-list">
                    <p class="empty-tip">暂无预约</p>
                </div>
            </div>

            <!-- 数据库管理 -->
            <div class="card">
                <div class="card-header">
                    <h2>数据库管理</h2>
                </div>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 12px;">
                    首次部署或数据异常时，点击下方按钮初始化数据库表结构。
                </p>
                <button class="btn btn-small btn-primary admin-action" id="btn-init-db">初始化数据库</button>
                <div id="db-status" class="db-status pending">
                    等待检查...
                </div>
            </div>
        </div>
    </div>

    <!-- 百业创建模态框 -->
    <div id="baiye-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建百业</h3>
                <button class="close-btn" data-close="baiye-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>百业名称 <span class="required">*</span></label>
                    <input type="text" id="baiye-name" class="form-control" placeholder="输入百业名称">
                </div>
                <div class="form-group">
                    <label>百业描述</label>
                    <input type="text" id="baiye-desc" class="form-control" placeholder="可选：输入描述">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" data-close="baiye-modal">取消</button>
                <button class="btn btn-primary" id="btn-save-baiye">保存</button>
            </div>
        </div>
    </div>

    <!-- 时间段创建模态框 -->
    <div id="time-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建时间段</h3>
                <button class="close-btn" data-close="time-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>时间描述 <span class="required">*</span></label>
                    <input type="text" id="time-desc" class="form-control" placeholder="例如：周一至周五 20:00-22:00">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" data-close="time-modal">取消</button>
                <button class="btn btn-primary" id="btn-save-time">保存</button>
            </div>
        </div>
    </div>

    <!-- 确认对话框（替代 window.confirm） -->
    <div id="confirm-modal" class="modal confirm-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>操作确认</h3>
                <button class="close-btn" data-close="confirm-modal">&times;</button>
            </div>
            <div class="modal-body">
                <p class="confirm-message" id="confirm-message">确定要执行此操作吗？</p>
            </div>
            <div class="modal-footer confirm-actions">
                <button class="btn" id="btn-confirm-cancel">取消</button>
                <button class="btn btn-danger" id="btn-confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <script type="module" src="/admin/app.js"></script>
</body>
</html>
